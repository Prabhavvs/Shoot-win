<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#1a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Sweet Shot - Web Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app">
        <section id="startScreen" class="screen active">
            <div class="start-content">
                <img class="start-arrow-ambient" src="assets/ui/arrow.png" alt="" aria-hidden="true">
                <img class="start-game-title" src="assets/start/game-title.png" alt="Shoot the Snack">
                <button id="startBtn" class="start-cta-btn" aria-label="Start Game">
                    <img class="start-cta-img" src="assets/start/cta-start.png" alt="Start Game">
                </button>
                <img class="start-rules" src="assets/start/rules.png" alt="Rules">
            </div>
            <div id="rulesModal" class="rules-modal" aria-hidden="true">
                <div class="rules-modal-overlay"></div>
                <button id="rulesCloseBtn" class="rules-close-btn" aria-label="Close Rules">×</button>
                <img class="rules-popup-img" src="assets/start/rules-popup.png" alt="Rules popup">
            </div>
        </section>

        <section id="gameScreen" class="screen">
            <img class="game-top-asset" src="assets/start/game-title.png" alt="Shoot the Snack">
            <div class="hud">
                <span id="scoreText">Correct Shots: 0/5</span>
                <span id="timeText">Time: 30</span>
            </div>
            <div id="gameStage">
                <canvas id="gameCanvas" width="390" height="700"></canvas>
                <div id="dragControlWrap">
                    <img id="dragControl" src="assets/ui/drag.png" alt="Drag to shoot control" draggable="false">
                </div>
            </div>
            <p class="hint">Hold &amp; drag the white circle below and release to shoot</p>
        </section>

        <section id="endScreen" class="screen">
            <div class="end-content">
                <img class="end-game-over-sign" src="assets/end/game-over-sign.png" alt="Game Over sign">
                <img class="end-wrong-copy" src="assets/end/wrong-item-copy.png" alt="You hit a wrong item">
                <div class="end-wrong-line" aria-hidden="true"></div>
                <img class="end-laughing" src="assets/end/laughing.png" alt="Laughing reaction">
                <button id="playAgainBtn" class="end-playagain-btn" aria-label="Play Again">
                    <img class="end-playagain-img" src="assets/end/play-again-cta.png" alt="Play Again">
                </button>
                <div class="end-you-won-wrap">
                    <img class="end-you-won" src="assets/end/you-won.png" alt="You Won">
                    <div class="end-you-won-burst" aria-hidden="true">
                        <span style="--r: 0deg; --d: 0ms;"></span>
                        <span style="--r: 30deg; --d: 30ms;"></span>
                        <span style="--r: 60deg; --d: 60ms;"></span>
                        <span style="--r: 90deg; --d: 90ms;"></span>
                        <span style="--r: 120deg; --d: 120ms;"></span>
                        <span style="--r: 150deg; --d: 150ms;"></span>
                        <span style="--r: 180deg; --d: 180ms;"></span>
                        <span style="--r: 210deg; --d: 210ms;"></span>
                        <span style="--r: 240deg; --d: 240ms;"></span>
                        <span style="--r: 270deg; --d: 270ms;"></span>
                        <span style="--r: 300deg; --d: 300ms;"></span>
                        <span style="--r: 330deg; --d: 330ms;"></span>
                    </div>
                </div>
                <img class="end-reward" src="assets/end/reward.png" alt="Reward">
                <h2 id="endTitle" class="end-fallback-text">Game Over</h2>
                <p id="endReason" class="end-fallback-text"></p>
                <p id="finalScore" class="end-fallback-text"></p>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
